<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Mayas Shop</title>

<link rel="stylesheet" href="style.css">

<style>
/* =======================
LOGIN PAGE (Unified Style)
======================= */

body{
    font-family:'Segoe UI', sans-serif;
    background:#f5f5f5; /* نفس خلفية الموقع */
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Login Card */
.container{
    width:360px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

/* Title */
.container h2{
    margin-bottom:20px;
    color:#111;
}

/* Inputs */
.input-box{
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    border-color:#00bcd4;
}

/* Button (same as main style) */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#111;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#00bcd4;
}

/* Links */
.options{
    margin-top:10px;
    font-size:12px;
}

.options a{
    color:#00bcd4;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

    <h2>Login</h2>

    <form method="POST">

        <div class="input-box">
            <input type="number" name="user_id" placeholder="User ID" required>
        </div>


        <button type="submit">Login</button>

    </form>

    <div class="options">
        <a href="#">Forgot Password?</a>
    </div>

</div>

</body>
</html>
